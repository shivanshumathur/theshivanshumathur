<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Page not found — Shivanshu Mathur</title>
  <meta name="description" content="This page does not exist. Head back to Shivanshu Mathur’s homepage.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://theshivanshumathur.vercel.app/404">

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/seo/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/seo/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/seo/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --text-primary: #fff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--text-primary);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(37, 99, 235, 0.18), transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(255, 255, 255, 0.04), transparent 50%),
        radial-gradient(ellipse 40% 30% at 10% 80%, rgba(37, 99, 235, 0.08), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .error-page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: rise 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .brand {
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.25s;
    }

    .brand:hover {
      color: var(--text-primary);
    }

    .code {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: clamp(88px, 22vw, 120px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      margin-bottom: 20px;
      animation: pulse-soft 4s ease-in-out infinite;
    }

    .headline {
      font-size: clamp(22px, 4.5vw, 28px);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 12px;
    }

    .support {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.55;
      color: var(--text-secondary);
      margin-bottom: 36px;
      max-width: 32ch;
      margin-left: auto;
      margin-right: auto;
    }

    .path {
      display: inline-block;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 12px;
      color: var(--text-tertiary);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      margin-bottom: 36px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0;
      animation: fade-in 0.5s ease 0.35s both;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      background: var(--accent);
      color: #fff;
      border-radius: 980px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.25s, transform 0.25s;
      animation: fade-in 0.5s ease 0.45s both;
    }

    .cta:hover {
      background: var(--accent-hover);
      transform: scale(1.03);
    }

    .cta:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }

    .cta svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.72; }
    }

    @media (prefers-reduced-motion: reduce) {
      .error-page,
      .path,
      .cta,
      .code {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <main class="error-page">
    <a class="brand" href="/">Shivanshu Mathur</a>
    <p class="code" aria-hidden="true">404</p>
    <h1 class="headline">This page doesn’t exist</h1>
    <p class="support">The link may be broken, or the page may have moved. Let’s get you back home.</p>
    <p class="path" id="requested-path" hidden></p>
    <a class="cta" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to homepage
    </a>
  </main>

  <script>
    (function () {
      var path = window.location.pathname + window.location.search;
      if (!path || path === "/" || path === "/404" || path === "/404.html") return;
      var el = document.getElementById("requested-path");
      el.textContent = path;
      el.hidden = false;
    })();
  </script>
</body>
</html>
